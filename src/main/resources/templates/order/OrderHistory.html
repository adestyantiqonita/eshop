<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Order History</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
  <h2>Search Order History</h2>
  <form th:action="@{/order/history}" method="post" class="form-inline mb-4">
    <input type="text" name="author" class="form-control mr-2" placeholder="Enter author name" required>
    <button type="submit" class="btn btn-info">Search</button>
  </form>

  <table class="table table-striped" th:if="${orders}">
    <thead>
    <tr>
      <th>Order ID</th>
      <th>Status</th>
      <th>Author</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
      <td th:text="${order.id}"></td>
      <td th:text="${order.status}"></td>
      <td th:text="${order.author}"></td>
      <td>
        <a th:href="@{/order/pay/{id}(id=${order.id})}" class="btn btn-sm btn-success">Pay Now</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
