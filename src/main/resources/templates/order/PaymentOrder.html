<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Payment Page</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <script>
    function togglePaymentFields() {
        var method = document.getElementById("paymentMethod").value;
        document.getElementById("voucherFields").style.display = (method === "VOUCHER") ? "block" : "none";
        document.getElementById("codFields").style.display = (method === "CASH_ON_DELIVERY") ? "block" : "none";
    }
  </script>
</head>
<body>
<div class="container mt-5">
  <h2>Complete Your Payment</h2>
  <p>Order ID: <strong th:text="${orderId}"></strong></p>

  <form th:action="@{/order/pay/{id}(id=${orderId})}" method="post">
    <div class="form-group">
      <label for="paymentMethod">Select Payment Method:</label>
      <select name="method" id="paymentMethod" class="form-control" onchange="togglePaymentFields()" required>
        <option value="">-- Choose Method --</option>
        <option value="VOUCHER">Voucher</option>
        <option value="CASH_ON_DELIVERY">Cash on Delivery (COD)</option>
      </select>
    </div>

    <div id="voucherFields" style="display:none;" class="card card-body mb-3">
      <label>Voucher Code:</label>
      <input type="text" name="voucherCode" class="form-control" placeholder="ESHOPxxxxxxxx">
      <small class="text-muted">Format: 16 chars, starts with ESHOP, contains 8 digits.</small>
    </div>

    <div id="codFields" style="display:none;" class="card card-body mb-3">
      <div class="form-group">
        <label>Delivery Address:</label>
        <input type="text" name="address" class="form-control">
      </div>
      <div class="form-group">
        <label>Delivery Fee:</label>
        <input type="text" name="deliveryFee" class="form-control">
      </div>
    </div>

    <button type="submit" class="btn btn-success">Submit Payment</button>
    <a href="/order/history" class="btn btn-secondary">Cancel</a>
  </form>
</div>
</body>
</html>
