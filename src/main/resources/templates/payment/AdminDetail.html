<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Payment</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Payment Detail</h2>
    <div class="card" th:object="${payment}">
        <div class="card-body">
            <p><strong>ID:</strong> <span th:text="*{id}"></span></p>
            <p><strong>Method:</strong> <span th:text="*{method}"></span></p>
            <p><strong>Status:</strong> <span th:text="*{status}"></span></p>

            <hr>
            <form th:action="@{/payment/admin/set-status/{id}(id=*{id})}" method="post">
                <div class="form-group">
                    <label>Update Status:</label>
                    <select name="status" class="form-control col-md-4">
                        <option value="SUCCESS">SUCCESS</option>
                        <option value="REJECTED">REJECTED</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success">Update Status</button>
                <a href="/payment/admin/list" class="btn btn-secondary">Back</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
